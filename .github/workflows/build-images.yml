name: Build And Publish Images

on:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "apps/cms/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      cms: ${{ steps.filter.outputs.cms }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'apps/cms/package.json'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/build-images.yml'
            cms:
              - 'apps/cms/**'
              - 'apps/web/package.json'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/build-images.yml'

  build-and-push:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            image: ghcr.io/perfzero/basis-web
            context: .
            file: ./apps/web/Dockerfile
            build_args: |
              STRAPI_URL=http://cms:1337
          - service: cms
            image: ghcr.io/perfzero/basis-cms
            context: .
            file: ./apps/cms/Dockerfile
            build_args: |
              STRAPI_ADMIN_BACKEND_URL=https://cms.basisthree.ru
              ADMIN_PATH=/admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        if: |
          github.event_name == 'workflow_dispatch' ||
          (matrix.service == 'web' && needs.changes.outputs.web == 'true') ||
          (matrix.service == 'cms' && needs.changes.outputs.cms == 'true')
        uses: docker/setup-buildx-action@v3

      - name: Login To GHCR
        if: |
          github.event_name == 'workflow_dispatch' ||
          (matrix.service == 'web' && needs.changes.outputs.web == 'true') ||
          (matrix.service == 'cms' && needs.changes.outputs.cms == 'true')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata
        if: |
          github.event_name == 'workflow_dispatch' ||
          (matrix.service == 'web' && needs.changes.outputs.web == 'true') ||
          (matrix.service == 'cms' && needs.changes.outputs.cms == 'true')
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build And Push ${{ matrix.service }}
        if: |
          github.event_name == 'workflow_dispatch' ||
          (matrix.service == 'web' && needs.changes.outputs.web == 'true') ||
          (matrix.service == 'cms' && needs.changes.outputs.cms == 'true')
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=min,scope=${{ matrix.service }}
