services:
  db:
    image: postgres:16-alpine
    container_name: basis-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-strapi}
      POSTGRES_USER: ${POSTGRES_USER:-strapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strapi}
    volumes:
      - basis_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-strapi} -d ${POSTGRES_DB:-strapi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cms:
    build:
      context: ./apps/cms
      dockerfile: Dockerfile
    container_name: basis-cms
    restart: unless-stopped
    env_file:
      - ./apps/cms/.env.production
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-strapi}
      DATABASE_USERNAME: ${POSTGRES_USER:-strapi}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-strapi}
      DATABASE_CLIENT: postgres
      NODE_ENV: production
    depends_on:
      - postgres
    ports:
      - "127.0.0.1:1337:1337"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: basis-web
    restart: unless-stopped
    env_file:
      - ./apps/web/.env.production
    environment:
      NODE_ENV: production
      STRAPI_URL: http://cms:1337
    depends_on:
      - cms
    ports:
      - "127.0.0.1:3100:3000"

volumes:
  basis_postgres_data:
