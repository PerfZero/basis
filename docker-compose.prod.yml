services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-strapi}
      POSTGRES_USER: ${POSTGRES_USER:-strapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strapi}
    volumes:
      - basis_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-strapi} -d ${POSTGRES_DB:-strapi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cms:
    build:
      context: ./apps/cms
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HOST: ${CMS_HOST:-0.0.0.0}
      PORT: ${CMS_PORT:-1337}
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-strapi}
      DATABASE_USERNAME: ${POSTGRES_USER:-strapi}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-strapi}
      DATABASE_CLIENT: postgres
      DATABASE_SSL: ${DATABASE_SSL:-false}
      NODE_ENV: production
    depends_on:
      - db
    volumes:
      - basis_cms_uploads:/app/public/uploads
    ports:
      - "127.0.0.1:1337:1337"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      STRAPI_URL: ${STRAPI_URL:-http://cms:1337}
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN:-}
    depends_on:
      - cms
    ports:
      - "127.0.0.1:3100:3000"

volumes:
  basis_postgres_data:
    external: true
    name: ${POSTGRES_VOLUME_NAME:-basis_basis_postgres_data}
  basis_cms_uploads:
    external: true
    name: ${CMS_UPLOADS_VOLUME_NAME:-basis_basis_cms_uploads}
